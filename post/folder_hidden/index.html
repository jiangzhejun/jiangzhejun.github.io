      <h1 class="post-title">显示或隐藏指定文件夹的 JScript 脚本</h1>
      <time class="post-date" datetime="2018-11-07 13:23:41 CST">07 Nov 2018</time>
    </header>

    <div class="highlight"><pre style="color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4"><code class="language-c" data-lang="c">var CONST_HIDDEN <span style="color:#f92672">=</span> <span style="color:#ae81ff">2</span>,
fso <span style="color:#f92672">=</span> new ActiveXObject(<span style="color:#e6db74">&#34;Scripting.FileSystemObject&#34;</span>),
folder <span style="color:#f92672">=</span> fso.GetFolder(<span style="color:#e6db74">&#34;myFolder&#34;</span>);
 
<span style="color:#66d9ef">if</span>(folder.attributes <span style="color:#f92672">&amp;</span> CONST_HIDDEN) {
    folder.attributes <span style="color:#f92672">&amp;=</span> <span style="color:#f92672">~</span>CONST_HIDDEN;
} <span style="color:#66d9ef">else</span> {
    folder.attributes <span style="color:#f92672">|=</span> CONST_HIDDEN;
}
</code></pre></div>
